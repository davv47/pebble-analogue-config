<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analogue Watchface Settings</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 24px 16px;
            max-width: 480px;
            margin: 0 auto;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #fff;
        }

        .subtitle {
            font-size: 13px;
            color: #888;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 12px;
        }

        .calendar-block {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .calendar-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .calendar-label {
            font-size: 14px;
            font-weight: 500;
            flex: 1;
        }

        input[type="url"], input[type="text"] {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            padding: 10px 12px;
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="url"]:focus, input[type="text"]:focus {
            border-color: #FF6600;
        }

        input::placeholder {
            color: #555;
        }

        .hint {
            font-size: 11px;
            color: #666;
            margin-top: 6px;
            line-height: 1.4;
        }

        .divider {
            height: 1px;
            background: #333;
            margin: 24px 0;
        }

        .save-btn {
            width: 100%;
            padding: 14px;
            background: #FF6600;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .save-btn:active {
            background: #cc5200;
        }

        .example-link {
            color: #FF6600;
            text-decoration: none;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <h1>Calendar Settings</h1>
    <p class="subtitle">
        Enter public ICS calendar URLs below. Works with any public calendar —
        Google Calendar, Apple iCloud shared calendars, sports calendars, etc.
    </p>

    <div class="section-title">Calendars</div>

    <div class="calendar-block">
        <div class="calendar-header">
            <div class="color-dot" style="background:#FF6600"></div>
            <span class="calendar-label">Calendar 1</span>
        </div>
        <input type="url" id="url0" placeholder="https://example.com/calendar.ics" />
        <p class="hint">
            e.g. Formula 1:
            <a class="example-link" href="#" onclick="fillF1()">fill F1 calendar</a>
        </p>
    </div>

    <div class="calendar-block">
        <div class="color-dot" style="background:#00AAFF; display:inline-block; width:14px; height:14px; border-radius:50%; margin-right:10px; vertical-align:middle"></div>
        <div class="calendar-header">
            <div class="color-dot" style="background:#00AAFF"></div>
            <span class="calendar-label">Calendar 2</span>
        </div>
        <input type="url" id="url1" placeholder="https://example.com/calendar.ics" />
    </div>

    <div class="calendar-block">
        <div class="calendar-header">
            <div class="color-dot" style="background:#AAFF00"></div>
            <span class="calendar-label">Calendar 3</span>
        </div>
        <input type="url" id="url2" placeholder="https://example.com/calendar.ics" />
    </div>

    <div class="divider"></div>

    <button class="save-btn" onclick="save()">Save & Close</button>

    <script>
        // Load existing config from URL param
        (function() {
            var params = new URLSearchParams(window.location.search);
            var raw = params.get("config");
            if (!raw) return;
            try {
                var config = JSON.parse(decodeURIComponent(raw));
                if (config.url0) document.getElementById("url0").value = config.url0;
                if (config.url1) document.getElementById("url1").value = config.url1;
                if (config.url2) document.getElementById("url2").value = config.url2;
            } catch(e) {}
        })();

        function fillF1() {
            document.getElementById("url0").value =
                "https://ics.ecal.com/ecal-sub/635c8b2d1c4e820023e8c5ea/Formula%201.ics";
        }

        function save() {
            var config = {
                url0: document.getElementById("url0").value.trim(),
                url1: document.getElementById("url1").value.trim(),
                url2: document.getElementById("url2").value.trim()
            };
            var encoded = encodeURIComponent(JSON.stringify(config));
            window.location = "pebblejs://close#" + encoded;
        }
    </script>
</body>
</html>
